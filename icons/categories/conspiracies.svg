<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- All-seeing eye in triangle -->
  <path d="M32 6L4 56h56L32 6z" fill="currentColor" opacity="0.3" stroke="currentColor" stroke-width="2"/>
  <!-- Inner triangle glow -->
  <path d="M32 16L14 50h36L32 16z" fill="currentColor" opacity="0.2"/>
  <!-- Eye outline -->
  <ellipse cx="32" cy="36" rx="12" ry="8" fill="currentColor" opacity="0.8"/>
  <!-- Iris -->
  <circle cx="32" cy="36" r="5" fill="currentColor" opacity="0.4"/>
  <!-- Pupil -->
  <circle cx="32" cy="36" r="2.5" fill="currentColor"/>
  <!-- Eye highlight -->
  <circle cx="34" cy="34" r="1" fill="currentColor" opacity="0.3"/>
  <!-- Rays from eye -->
  <path d="M20 36h-4M44 36h4M24 28l-2-2M40 28l2-2M24 44l-2 2M40 44l2 2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <!-- Question marks around -->
  <text x="8" y="28" font-family="serif" font-size="8" fill="currentColor" opacity="0.4">?</text>
  <text x="52" y="28" font-family="serif" font-size="8" fill="currentColor" opacity="0.4">?</text>
</svg>
